name: Update Scoop Manifest

# Runs automatically after the Release workflow completes successfully.
# It downloads the Windows binary from the new GitHub Release, computes
# its SHA-256 hash, updates bucket/shed.json, and commits the change.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-manifest:
    name: Update bucket/shed.json
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          # Use a token with write access so the commit can be pushed
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Extract the version from the tag (strips leading 'v') ────────────
      - name: Set version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=${TAG#v}" >> "$GITHUB_OUTPUT"

      # ── Download the Windows binary that was just published ───────────────
      # The artifact name in the release is shed-windows-x86_64.exe
      # The download URL is:
      #   https://github.com/OWNER/REPO/releases/download/TAG/FILENAME
      - name: Download Windows binary
        run: |
          URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/shed-windows-x86_64.exe"
          echo "Downloading $URL"
          curl -fsSL "$URL" -o shed-windows-x86_64.exe

      # ── Compute SHA-256 (Scoop expects lowercase hex, no filename suffix) ─
      - name: Compute SHA-256
        id: sha
        run: |
          HASH=$(sha256sum shed-windows-x86_64.exe | awk '{print $1}')
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "SHA-256: $HASH"

      # ── Patch bucket/shed.json in-place ──────────────────────────────────
      - name: Update manifest
        env:
          VERSION: ${{ steps.version.outputs.ver }}
          TAG:     ${{ steps.version.outputs.tag }}
          HASH:    ${{ steps.sha.outputs.hash }}
        run: |
          MANIFEST="shed.json"

          # Replace version field
          sed -i "s|\"version\":.*|\"version\": \"${VERSION}\",|" "$MANIFEST"

          # Replace download URL (contains version in path)
          # Matches any previously stored tag such as v0.1.0, v0.2.0, …
          sed -i "s|releases/download/v[^/]*/shed-windows|releases/download/${TAG}/shed-windows|" "$MANIFEST"

          # Replace hash — use -E (ERE) so [0-9a-f]{64} works on Linux
          # First release uses literal PLACEHOLDER; subsequent ones contain the old hash.
          sed -E -i "s|\"hash\": \"([0-9a-f]{64}\|PLACEHOLDER)\"|\"hash\": \"${HASH}\"|" "$MANIFEST"

          echo "Updated manifest:"
          cat "$MANIFEST"

      # ── Commit and push ───────────────────────────────────────────────────
      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/shed.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update scoop manifest to ${{ steps.version.outputs.tag }}"
          git push
