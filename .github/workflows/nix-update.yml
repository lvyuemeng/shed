name: nix-update

# Triggered automatically after the release workflow succeeds.
# Fetches each pre-built binary, computes its Nix SRI hash, and commits
# the updated nix/shed.nix back to main.
on:
    workflow_run:
        workflows: ["Release"]
        types: [completed]

jobs:
    update-nix:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  ref: main

            - name: Install Nix
              uses: cachix/install-nix-action@v31
              with:
                  nix_path: nixpkgs=channel:nixpkgs-unstable

            - name: Resolve released version
              id: version
              run: |
                  # For tag-triggered workflow_run events, head_branch carries the tag name.
                  TAG="${{ github.event.workflow_run.head_branch }}"
                  VERSION="${TAG#v}"
                  echo "Detected version: ${VERSION}"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Update nix/shed.nix hashes
              run: bash nix/update.sh "${{ steps.version.outputs.version }}"

            - name: Commit updated derivation
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add nix/shed.nix
                  if git diff --cached --quiet; then
                    echo "nix/shed.nix is already up to date — nothing to commit."
                  else
                    git commit -m "nix: update shed.nix to v${{ steps.version.outputs.version }}"
                    git push origin main
                  fi
